# Local OpenTelemetry Collector — forwards the app's OTLP telemetry to
# Splunk Observability Cloud.
#   metrics -> signalfx exporter. send_otlp_histograms:true is required so the
#              GenAI histograms AI Agent Monitoring relies on (e.g.
#              gen_ai.evaluation.score, token-usage histograms) are ingested.
#   traces  -> Splunk APM via the OTLP/HTTP trace ingest endpoint.
# Realm + token come from the container environment (SPLUNK_REALM /
# SPLUNK_ACCESS_TOKEN), injected by run-collector.sh from .env.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}
  # Galileo only ingests GenAI spans. Drop everything else (FastAPI HTTP
  # server/client spans) before the Galileo exporter so they don't trigger
  # Galileo's "No GenAI patterns detected in spans" partial-success drops. Keeps
  # only spans carrying gen_ai.operation.name (workflow / invoke_agent / chat).
  # Splunk APM still receives the full trace via the separate traces pipeline.
  filter/genai_only:
    error_mode: ignore
    traces:
      span:
        - 'attributes["gen_ai.operation.name"] == nil'

exporters:
  signalfx:
    access_token: "${env:SPLUNK_ACCESS_TOKEN}"
    realm: "${env:SPLUNK_REALM}"
    send_otlp_histograms: true
  otlphttp/traces:
    traces_endpoint: "https://ingest.${env:SPLUNK_REALM}.signalfx.com/v2/trace/otlp"
    headers:
      X-SF-Token: "${env:SPLUNK_ACCESS_TOKEN}"
  # Galileo (LLM observability). Same gen_ai.* spans fan out here over OTLP/HTTP.
  # Header KEYS are fixed (Galileo-API-Key/project/logstream); values from env,
  # injected by run-collector.sh. Galileo auto-maps OpenTelemetry GenAI semconv.
  otlphttp/galileo:
    traces_endpoint: "https://api.multitenant.galileocloud.io/otel/traces"
    headers:
      Galileo-API-Key: "${env:GALILEO_API_KEY}"
      project: "${env:GALILEO_PROJECT}"
      logstream: "${env:GALILEO_LOG_STREAM}"

service:
  pipelines:
    # Splunk APM: full traces (HTTP + GenAI spans).
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/traces]
    # Galileo: GenAI spans only (HTTP spans filtered out above).
    traces/galileo:
      receivers: [otlp]
      processors: [filter/genai_only, batch]
      exporters: [otlphttp/galileo]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [signalfx]
  telemetry:
    logs:
      level: info
