<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in · MedAdvice</title>
  <style>
    :root{
      --primary:#2563eb; --primary-hover:#1d4ed8; --ring:#93bbfd;
      --ink:#0f172a; --muted:#64748b; --bg1:#eff6ff; --bg2:#e2e8f0; --danger:#dc2626;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:radial-gradient(1200px 600px at 50% -10%, var(--bg1), var(--bg2)); color:var(--ink);
    }
    .card{
      width:100%; max-width:400px; background:#fff; border:1px solid #e5e7eb; border-radius:20px;
      box-shadow:0 20px 40px -12px rgba(15,23,42,.18), 0 2px 6px rgba(15,23,42,.06);
      padding:36px 32px; animation:rise .4s cubic-bezier(.2,.8,.2,1);
    }
    @keyframes rise{from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:none}}
    .brand{display:flex; align-items:center; gap:12px; margin-bottom:26px}
    .logo{
      width:42px; height:42px; border-radius:13px; flex:none;
      background:linear-gradient(135deg, var(--primary), #60a5fa);
      display:flex; align-items:center; justify-content:center; color:#fff;
      box-shadow:0 6px 16px -4px rgba(37,99,235,.6);
    }
    .logo svg{width:23px; height:23px}
    .brand b{font-size:18px; font-weight:700; letter-spacing:-.01em; display:block; line-height:1.1}
    .brand small{color:var(--muted); font-size:12px}
    h1{font-size:21px; margin:0 0 7px; letter-spacing:-.02em}
    p.sub{margin:0 0 22px; color:var(--muted); font-size:14px; line-height:1.55}
    label{display:block; font-size:13px; font-weight:600; margin:0 0 8px; color:#334155}
    input[type=password]{
      width:100%; padding:12px 14px; font-size:15px; border:1px solid #cbd5e1; border-radius:12px;
      outline:none; background:#f8fafc; transition:border-color .15s, box-shadow .15s, background .15s;
    }
    input[type=password]:focus{border-color:var(--primary); box-shadow:0 0 0 4px rgba(147,187,253,.45); background:#fff}
    button{
      width:100%; margin-top:18px; padding:12px 16px; font-size:15px; font-weight:600; color:#fff;
      background:var(--primary); border:0; border-radius:12px; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:8px;
      transition:background .15s, transform .05s;
    }
    button:hover{background:var(--primary-hover)}
    button:active{transform:translateY(1px)}
    .error{
      display:none; margin:0 0 18px; padding:11px 14px; background:#fef2f2; border:1px solid #fecaca;
      color:var(--danger); font-size:13px; border-radius:10px; align-items:center; gap:8px;
    }
    .error.show{display:flex}
    .foot{margin-top:24px; text-align:center; color:#94a3b8; font-size:12px}
  </style>
</head>
<body>
  <form class="card" method="POST" action="/login">
    <div class="brand">
      <span class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 3v18M3 12h18" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
      </span>
      <span><b>MedAdvice</b><small>Medical guidance</small></span>
    </div>

    <h1>Enter your access code</h1>
    <p class="sub">This application is private. Enter the access code you were given to continue.</p>

    <div class="error" id="err" role="alert">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 7v6M12 16.5v.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span>Incorrect access code. Please try again.</span>
    </div>

    <label for="code">Access code</label>
    <input id="code" name="access_code" type="password" placeholder="••••••••••••••" autocomplete="current-password" autofocus required>
    <input type="hidden" id="next" name="next" value="/app">

    <button type="submit">
      Continue
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <div class="foot">Authorized access only</div>
  </form>

  <script>
    const q = new URLSearchParams(location.search);
    if (q.get('error')) document.getElementById('err').classList.add('show');
    const nx = q.get('next');
    if (nx && nx.startsWith('/') && !nx.startsWith('//')) document.getElementById('next').value = nx;
  </script>
</body>
</html>
